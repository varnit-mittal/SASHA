## RL hyperparameters (3-class subtype)
# Used by step6_rl_training.py.

train_epoch: 25
num_envs: 2
B: 1
warmup_epoch: 0
wd: 0.0001
lr: 0.00001
min_lr: 0


# Other hyperparameters
explore_frac: 0.05
gamma: 1.0
clip: 0.1
entropy_coef: 0.001
use_entropy_loss: True
max_grad_norm: 0.5
num_epochs_on_single_roll_out: 4
only_ce_as_reward: True
use_gae: True
lam: 0.95

# Dataset details
dataset: glioma3
nas_root: /mnt/nas         # prefixes relative paths below
fglobal: 'mlp'
n_class: 3

## Pretrained backbone
backbone: 'ViT-S/16'   #'ResNet_50' 'ViT-S/16'
pretrain: 'medical_ssl' #natural_supervised medical_ssl
D_feat: 384
D_inner: 128


# Model weights -
frac_visit: 0.2
cosine_threshold: 0.95
classifier_ckpt_path: sasha_outputs/glioma3/logs/glioma3_hafed/models/DEBUG/checkpoint-best.pt   # output of step3
mlp_fglobal_ckpt:     sasha_outputs/glioma3/logs/glioma3_tsu/models/DEBUG/checkpoint-best.pt    # output of step5 (cosine_threshold must match)
level1_path: sasha_outputs/glioma3/features/intermediate_hafed                                  # output of step4
level3_path: sasha_outputs/glioma3/features/lr/h5_files                                         # output of step2


# Restart training
restart: False


# Extra hyperparameters
n_worker: 8
pin_memory: False
n_shot: -1
dim_reduction: False
