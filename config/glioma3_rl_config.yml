## RL hyperparameters (3-class subtype)
# Used by step6_rl_training.py.

train_epoch: 25
num_envs: 2
B: 1
warmup_epoch: 0
wd: 0.0001
lr: 0.00001
min_lr: 0


# Other hyperparameters
explore_frac: 0.05
gamma: 1.0
clip: 0.1
entropy_coef: 0.001
use_entropy_loss: True
max_grad_norm: 0.5
num_epochs_on_single_roll_out: 4
only_ce_as_reward: True
use_gae: True
lam: 0.95

# Dataset details
dataset: glioma3
nas_root:         # optional NAS root, e.g. \\172.16.202.70\my_share
fglobal: 'mlp'
n_class: 3

## Pretrained backbone
backbone: 'ViT-S/16'   #'ResNet_50' 'ViT-S/16'
pretrain: 'medical_ssl' #natural_supervised medical_ssl
D_feat: 384
D_inner: 128


# Model weights -
frac_visit: 0.2
cosine_threshold: 0.95
classifier_ckpt_path:         # HAFED classifier ckpt path (output of step3)
mlp_fglobal_ckpt :            # TSU model checkpoint path (output of step5; cosine_threshold must match)
level1_path:                  # HAFED intermediate feature representation path (output of step4)
level3_path:                  # Low-resolution feature path (output of step2)


# Restart training
restart: False


# Extra hyperparameters
n_worker: 8
pin_memory: False
n_shot: -1
dim_reduction: False
