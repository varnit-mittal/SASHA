#### ---------------------- HAFED config parameters (3-class subtype) ----------
# Used by step3_WSI_classification_HAFED.py and step4_extract_intermediate_features.py.

# Training hyperparameters
train_epoch: 80           # number of epochs (was 50; best epoch was 17/50 with degenerate model, give the new config room)
B: 1                      # batch size
warmup_epoch: 3           # number of warm-up epochs (was 0; small data + B=1 benefits from warmup)
wd: 0.0001                # weight decay
lr: 0.0004
min_lr: 0
label_smoothing: 0.1      # CE label smoothing; helps with small val set noise
use_class_weights: True   # weight CE by inverse train-set class frequency
grad_clip: 1.0            # clip grad norm; B=1 makes gradients noisy


# ACMIL hyperparameters (kept so config is interchangeable with --arch acmil)
n_token: 5
n_masked_patch: 20


# HAFED model hyperparameters
# n_token_1=n_token_2=1 disables HAFED's multi-head diff_loss (inner loops are no-ops)
# and degenerates the architecture into single-attention MIL. Use 5 like the paper.
n_token_1: 5            # number of attention models in attention block 1
n_token_2: 5            # number of attention models in attention block 2
n_masked_patch_1: 10    # top-K instances randomly masked in STKIM
n_masked_patch_2: 20
mask_drop: 0.4

# Dataset
dataset: glioma3
nas_root: /mnt/nas                                     # prefixes any relative path below
n_class: 3                                             # subtype_1 / subtype_2 / subtype_3
data_dir: sasha_outputs/glioma3/features/hr/h5_files   # high-res h5 features written by step2
data_csv:                                              # not used by split_dataset_glioma3 (splits live in dataset_csv/glioma3/splits)

## Pretrained backbone
backbone: 'ViT-S/16'   #'ResNet_50' 'ViT-S/16'
pretrain: 'medical_ssl' #natural_supervised medical_ssl
D_feat: 384
D_inner: 128

# Other hyperparameters
n_worker: 8                           # number of workers
pin_memory: False                     # use pin memory in dataloader
n_shot: -1
dim_reduction: False
