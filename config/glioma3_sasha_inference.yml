## SASHA inference config (3-class subtype)
# Used by step7_inference.py.

B: 1

# Dataset details
dataset: glioma3
nas_root:                  # optional NAS root, e.g. \\172.16.202.70\my_share
fglobal: 'mlp'
n_class: 3

## Pretrained backbone
backbone: 'ViT-S/16'   #'ResNet_50' 'ViT-S/16'
pretrain: 'medical_ssl' #natural_supervised medical_ssl
D_feat: 384
D_inner: 128
only_ce_as_reward: True


# Model weights
frac_visit: 0.2
cosine_threshold: 0.95
classifier_ckpt_path: sasha_outputs/logs/glioma3_hafed/models/DEBUG/checkpoint-best.pt
mlp_fglobal_ckpt:     sasha_outputs/logs/glioma3_tsu/models/DEBUG/checkpoint-best.pt
level1_path:          sasha_outputs/features/glioma3_intermediate_hafed
level3_path:          sasha_outputs/features/glioma3_lr/h5_files
rl_ckpt_path:         sasha_outputs/logs/glioma3_rl/cosine_0.95_frac_0.2_seed_4/models/DEBUG/checkpoint-best.pt

# Extra hyperparameters
n_worker: 8
pin_memory: False
n_shot: -1
dim_reduction: False
